name: Google Cloud Recommendations AI
description: >-
  Google Cloud Recommendations AI delivers personalized product recommendations
  at scale. It uses machine learning to understand customer behavior and product
  catalog data to generate highly relevant recommendations for retail and
  e-commerce use cases including product discovery, related items, and
  frequently bought together.
